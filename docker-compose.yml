services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/server/data
    environment:
      - DB_PATH=/app/server/data/app.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
